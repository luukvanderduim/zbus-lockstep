name: build-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Grant job explicit rights to write annotations:
    permissions:
      checks: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v3
      - name: Run security audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
