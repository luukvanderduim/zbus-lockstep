# git-cliff ~ default configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# changelog header
header = """
# zbus-lockstep Changelog\n
All notable changes to this project will be documented in this file.\n
"""
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }} \
            ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/luukvanderduim/zbus-lockstep/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
# template for the changelog footer
footer = """
<!-- generated by git-cliff -->
"""
# remove the leading and trailing s
trim = true
# postprocessors
postprocessors = [
  { pattern = 'git@github.com:luukvanderduim/zbus-lockstep.git', replace = "https://github.com/luukvanderduim/zbus-lockstep" }, # replace repository URL
]

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = false
# process each line of a commit as an individual commit
split_commits = false
# regex for preprocessing the commit messages
commit_preprocessors = [
  # Replace PR/issue numbers (e.g. "(#12)") with active GitHub links
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/luukvanderduim/zbus-lockstep/pull/${2}))" },
]
# regex for parsing and grouping commits
commit_parsers = [
  { message = "^🎉|^:tada:", group = "<!-- 0 -->🎉 Begin project" },
  { message = "^feat|^✨|^:sparkles:", group = "<!-- 1 -->✨ Features" },
  { message = "^💥|^:boom:", group = "<!-- 2 -->💥 Breaking change" },
  { message = "^fix|^🐛|^:bug:|^🚑️|^:ambulance:|^🩹|^:adhesive_bandage:", group = "<!-- 3 -->🐛 Fixes" },
  { message = "^doc|^📝|^:memo:", group = "<!-- 4 -->📝 Documentation" },
  { message = "^perf|^⚡|^:zap:", group = "<!-- 5 -->⚡ Performance" },
  { message = "^refactor|^♻️|^:recycle:|^🚚|^:truck:", group = "<!-- 6 -->♻️ Refactor / Move files" },
  { message = "^style|^💄|^:lipstick:|^🎨|^:art:", group = "<!-- 7 -->💄 Art and Style" },
  { message = "^test|^✅|^:white_check_mark:|^🧪|^:test_tube:|^🦺|^:safety_vest:", group = "<!-- 8 -->✅ Testing and validation" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^chore|^ci|^⚙️|^:gear:", group = "<!-- 9 -->⚙️ Miscellaneous Tasks" },
  { message = ".*🔒️|.*🔐|.*:lock:|.*:key:", group = "<!-- 10 -->🔒️ Security / Secrets" },
  { message = "^⏪️|^:rewind:|^🔥|^:fire:", group = "<!-- 11 -->⏪️ Revert / Remove" },
  { message = "^alien|^👽️|^:alien:", group = "<!-- 13 -->👽️ External API changes" },
  { message = "^wheelchair|^♿️|^:wheelchair:", group = "<!-- 15 -->♿️ Accessibility" },
  { message = "^children_crossing|^🚸|^:children_crossing:", group = "<!-- 16 -->🚸 Improve UX" },
  { message = "^iphone|^🧑‍💻|^:technologist:", group = "<!-- 17 -->🧑‍💻 Improve DX" },
  { message = "^triangular_flag_on_post|^🚩|^:triangular_flag_on_post:", group = "<!-- 18 -->🚩 Feature flags" },
  { message = "^thread|^🧵|^:thread:", group = "<!-- 19 -->🧵 Multithreading / Concurrency" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false
# filter out the commits that are not matched by commit parsers
filter_commits = false
# regex for matching git tags
tag_pattern = "v[0-9].*"
# regex for skipping tags
# skip_tags = ""
# regex for ignoring tags
# ignore_tags = ""
# sort the tags topologically
topo_order = false
# sort the commits inside sections by oldest/newest order
sort_commits = "oldest"
